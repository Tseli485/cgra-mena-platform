name: Build executables (Windows / macOS / Linux)

on:
  workflow_dispatch:        # lancement manuel depuis l'onglet Actions
  push:
    tags: ['v*']            # ou en poussant un tag (ex. v1.1.0)

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sep: ';'
            iconarg: '--icon icon.ico'
            artifact: MENA-Tuteur-Windows
          - os: macos-latest
            sep: ':'
            iconarg: ''
            artifact: MENA-Tuteur-macOS
          - os: ubuntu-latest
            sep: ':'
            iconarg: ''
            artifact: MENA-Tuteur-Linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller pillow
      - name: Exclure les modeles IA de l'executable (charges depuis le site, mis en cache)
        run: python -c "import shutil; shutil.rmtree('pwa/models', ignore_errors=True)"
      - name: Build executable
        run: pyinstaller --onefile --name MENA-Tuteur ${{ matrix.iconarg }} --add-data "pwa${{ matrix.sep }}pwa" --console server.py
      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          APP="dist/MENA Tuteur.app"
          mkdir -p "$APP/Contents/MacOS"
          cp dist/MENA-Tuteur "$APP/Contents/MacOS/MENA-Tuteur"
          chmod +x "$APP/Contents/MacOS/MENA-Tuteur"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo '<key>CFBundleName</key><string>MENA Tuteur</string>'
            echo '<key>CFBundleExecutable</key><string>MENA-Tuteur</string>'
            echo '<key>CFBundleIdentifier</key><string>be.mena.tuteur</string>'
            echo '<key>CFBundleVersion</key><string>1.0</string>'
            echo '<key>CFBundlePackageType</key><string>APPL</string>'
            echo '</dict></plist>'
          } > "$APP/Contents/Info.plist"
          cd dist && zip -ry MENA-Tuteur-macOS.app.zip "MENA Tuteur.app" && rm -rf "MENA Tuteur.app"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: Publier la release (tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Preparer les fichiers et calculer les SHA-256
        run: |
          mkdir release
          cp artifacts/MENA-Tuteur-Windows/MENA-Tuteur.exe release/MENA-Tuteur-Windows.exe
          cp artifacts/MENA-Tuteur-Linux/MENA-Tuteur release/MENA-Tuteur-Linux
          cp artifacts/MENA-Tuteur-macOS/MENA-Tuteur-macOS.app.zip release/MENA-Tuteur-macOS.app.zip 2>/dev/null || cp artifacts/MENA-Tuteur-macOS/MENA-Tuteur release/MENA-Tuteur-macOS
          cd release && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: Creer la release GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" release/* --repo ${{ github.repository }} --title "Plateforme MENA Tuteur $TAG" --notes "Application autonome (aucune installation). **Windows** : double-clic sur l'exe. **macOS** : dezippez puis clic droit -> Ouvrir. **Linux** : chmod +x puis executer. Verifiez l'integrite avec SHA256SUMS.txt. Lien web : https://tseli485.github.io/cgra-mena-platform/"

  gh-pages:
    name: gh-pages-publish (site public au tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - name: Publier pwa/ sur gh-pages
        run: |
          git config user.name "release-bot"
          git config user.email "actions@github.com"
          git subtree split --prefix pwa -b gh-pages-ci
          git push -f origin gh-pages-ci:gh-pages
