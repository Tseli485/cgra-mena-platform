name: Build executables (Windows / macOS / Linux)

on:
  workflow_dispatch:        # lancement manuel depuis l'onglet Actions
  push:
    tags: ['v*']            # ou en poussant un tag (ex. v1.0)

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sep: ';'
            iconarg: '--icon icon.ico'
            artifact: MENA-Tuteur-Windows
          - os: macos-latest
            sep: ':'
            iconarg: ''
            artifact: MENA-Tuteur-macOS
          - os: ubuntu-latest
            sep: ':'
            iconarg: ''
            artifact: MENA-Tuteur-Linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller pillow
      - name: Build executable
        run: pyinstaller --onefile --name MENA-Tuteur ${{ matrix.iconarg }} --add-data "pwa${{ matrix.sep }}pwa" --console server.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
