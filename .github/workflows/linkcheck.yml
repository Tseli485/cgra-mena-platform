name: Veille mensuelle (liens officiels)

on:
  schedule:
    - cron: '0 6 1 * *'   # le 1er de chaque mois à 06:00 UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les liens des ressources et sources officielles
        run: |
          python3 - << 'EOF'
          import json, re, urllib.request, ssl
          ctx = ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE
          urls = set()
          data = json.load(open('pwa/data/resources.json', encoding='utf-8'))
          for r in data.get('resources', []):
              u = r.get('website')
              if u and u.startswith('http'): urls.add(u)
          html = open('pwa/index.html', encoding='utf-8').read()
          urls |= set(re.findall(r'https?://[^\s"\'\\)<>`]+', html))
          dead = []
          for u in sorted(urls):
              try:
                  req = urllib.request.Request(u, headers={'User-Agent':'Mozilla/5.0 (linkcheck)'})
                  code = urllib.request.urlopen(req, timeout=15, context=ctx).getcode()
                  if code >= 400: dead.append(f"{code} {u}")
              except Exception as e:
                  dead.append(f"ERR {u} ({type(e).__name__})")
          print(f"{len(urls)} liens vérifiés, {len(dead)} problèmes")
          if dead:
              print("\n".join(dead))
              open('dead_links.txt','w').write("\n".join(dead))
          EOF
      - name: Créer une issue si liens morts
        if: hashFiles('dead_links.txt') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "🔗 Veille mensuelle : liens à vérifier ($(date +%Y-%m))" \
            --body "$(printf 'Liens en erreur détectés par la veille automatique :\n\n```\n%s\n```\nVérifier et mettre à jour resources.json / index.html.' "$(cat dead_links.txt)")" \
            --repo ${{ github.repository }}
