name: CI (validation des données et versions)

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Valider les JSON de données
        run: |
          python3 - << 'EOF'
          import json, glob, sys
          files = glob.glob('pwa/**/*.json', recursive=True)
          bad = []
          for f in files:
              try: json.load(open(f, encoding='utf-8'))
              except Exception as e: bad.append(f"{f}: {e}")
          if bad: print("\n".join(bad)); sys.exit(1)
          print(f"OK — {len(files)} JSON valides")
          EOF
      - name: Vérifier la cohérence des versions (index / version.json)
        run: |
          python3 - << 'EOF'
          import json, re, sys
          v = json.load(open('pwa/version.json'))['version']
          html = open('pwa/index.html', encoding='utf-8').read()
          m = re.search(r"APP_VERSION='([^']+)'", html)
          assert m, "APP_VERSION introuvable"
          assert m.group(1) == v, f"index.html={m.group(1)} != version.json={v}"
          print("Versions cohérentes:", v)
          EOF
      - name: Gate encodage UTF-8 (bug cp1252 attrape le 11/06/2026)
        run: |
          python3 - << 'EOF'
          import glob, sys
          bad = []
          for f in glob.glob('pwa/**/*.json', recursive=True) + glob.glob('pwa/*.html') + glob.glob('pwa/js/*.js'):
              try: open(f, encoding='utf-8').read()
              except Exception as e: bad.append(f"{f}: {e}")
          if bad: print(chr(10).join(bad)); sys.exit(1)
          print("OK — tous les fichiers texte sont en UTF-8")
          EOF
      - name: Gate syntaxe JS de index.html (node --check)
        run: |
          python3 - << 'EOF'
          s = open('pwa/index.html', encoding='utf-8').read()
          i = s.index('<script src="js/nl-fr-dict.js"')
          j = s.index('<script>', i); k = s.index('</script>', j)
          open('_chk.js', 'w', encoding='utf-8').write(s[j+8:k])
          EOF
          node --check _chk.js && echo "OK — syntaxe JS valide"
          node --check pwa/js/bergamot-worker.js && echo "OK — worker valide"
          node --check pwa/js/nl-fr-dict.js && echo "OK — dictionnaire valide"
      - name: Gate notes de version (CHANGELOG contient APP_VERSION)
        run: |
          python3 - << 'EOF'
          import re
          s = open('pwa/index.html', encoding='utf-8').read()
          v = re.search(r"APP_VERSION='([^']+)'", s).group(1)
          assert f"'{v}':" in s.split('const CHANGELOG=')[1][:4000], f"CHANGELOG sans entree pour {v}"
          print("OK — CHANGELOG a une entree pour", v)
          EOF
      - name: Audit harness deterministe
        run: node scripts/harness-audit.js repo --format text
      - name: Vérifier qu'aucune donnée réelle n'est présente
        run: |
          ! grep -rniE "9777786|baghlan|saltanat|dorina popa|basir ahmad" pwa/ || (echo "DONNEES REELLES DETECTEES" && exit 1)
          echo "OK — aucune donnée personnelle réelle"

  tests-e2e:
    name: Tests navigateur (bloquants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Installer Playwright
        run: pip -q install playwright && python -m playwright install chromium --with-deps
      - name: Executer pwa/tests.html (echec si un test echoue)
        run: |
          python -m http.server 8766 --directory pwa &
          sleep 2
          python - << 'PYEOF'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch()
              pg = b.new_page()
              pg.goto('http://localhost:8766/tests.html')
              pg.wait_for_timeout(5000)
              res = pg.evaluate("document.querySelector('h2')?.textContent")
              ok = pg.evaluate("document.querySelector('h2')?.className")
              fails = pg.evaluate("[...document.querySelectorAll('#r li.ko')].map(li=>li.textContent)")
              print('Resultat:', res)
              if fails: print('ECHECS:', fails)
              assert ok == 'ok' and res, 'tests navigateur en echec'
              b.close()
          PYEOF
